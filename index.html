<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/app-icon-1024.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f5f3f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="XaePay" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="XaePay" />
    <meta name="description" content="XaePay — the AI compliance and routing layer for Nigerian cross-border payments. For businesses, exchange operators (BDCs), payment agents, and individuals or businesses operating from overseas." />
    <meta name="keywords" content="cross-border payments, Nigeria fintech, BDC, bureau de change, Triple-A, Cedar Money, NGN, USDT, compliance, MT103, IMTO" />
    <link rel="canonical" href="https://xaepay.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp link previews) -->
    <meta property="og:site_name" content="XaePay" />
    <meta property="og:title" content="XaePay — Cross-border payments, defended." />
    <meta property="og:description" content="The intelligence layer for cross-border payments. Built. Governed. Optimized. For Nigerian exchange operators, businesses, and overseas senders." />
    <meta property="og:url" content="https://xaepay.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://xaepay.com/og.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="XaePay — Cross-border payments, defended." />
    <meta name="twitter:description" content="The AI compliance and routing layer for Nigerian cross-border payments." />
    <meta name="twitter:image" content="https://xaepay.com/og.svg" />

    <title>XaePay — Cross-border payments, defended.</title>

    <!-- Structured data: Organization + WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "XaePay",
          "url": "https://xaepay.com",
          "logo": "https://xaepay.com/favicon.svg",
          "description": "AI compliance and routing infrastructure for Nigerian cross-border payments.",
          "address": [
            { "@type": "PostalAddress", "addressLocality": "Lagos", "addressCountry": "NG" },
            { "@type": "PostalAddress", "addressLocality": "Los Angeles", "addressCountry": "US" }
          ],
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "name": "XaePay",
          "url": "https://xaepay.com",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://xaepay.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
