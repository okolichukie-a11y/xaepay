name: Compliance watchman daily

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call compliance-watchman
        run: |
          set -e
          http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            https://pgsriqdnadlbahfanxrm.supabase.co/functions/v1/compliance-watchman \
            -H "Content-Type: application/json" \
            -H "x-watchman-secret: ${{ secrets.WATCHMAN_SECRET }}" \
            -d '{"tier":"pro"}')
          echo "HTTP $http_code"
          echo "--- response body ---"
          cat /tmp/resp.json
          echo ""
          echo "--- end ---"
          if [ "$http_code" != "200" ]; then
            exit 1
          fi
