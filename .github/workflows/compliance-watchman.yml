name: Compliance watchman daily
  on:
    schedule:
      - cron: "0 9 * * *"
    workflow_dispatch:
  jobs:
    run:
      runs-on: ubuntu-latest
      steps:
        - name: Call compliance-watchman
          run: |
            curl -fsS -X POST \
              https://pgsriqdnadlbahfanxrm.supabase.co/functions/v1/compliance-watchman \
              -H "Content-Type: application/json" \
              -H "x-watchman-secret: ${{ secrets.WATCHMAN_SECRET }}" \
              -d '{"tier":"pro"}'
